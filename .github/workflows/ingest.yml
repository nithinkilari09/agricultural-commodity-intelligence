name: Daily Mandi Price Ingestion

on:
  # Run every day at 03:00 UTC (~08:30 IST, ~22:00 Oklahoma time).
  # API data.gov.in typically publishes new records earlier in the Indian day,
  # so this hits the freshest data.
  schedule:
    - cron: "0 3 * * *"

  # Also allow manual runs from the GitHub Actions UI (useful for testing).
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingestion/ingest.py